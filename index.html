<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #eee;
  flex-direction: column;
  gap: 16px;
}
#info {
  display: flex;
  gap: 32px;
  font-size: 20px;
}
#info span { font-weight: bold; color: #e94560; }
canvas {
  border: 2px solid #e94560;
  border-radius: 4px;
  background: #16213e;
}
#overlay {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
#overlay h1 { font-size: 48px; color: #e94560; }
#overlay p { font-size: 20px; color: #aaa; }
button {
  padding: 12px 32px;
  font-size: 18px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
button:hover { background: #c73651; }
</style>
</head>
<body>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="highScore">0</span></div>
</div>
<div style="position:relative">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay">
    <h1>Snake</h1>
    <p>Use Left/Right arrows or A/D to steer</p>
    <button id="startBtn">Start Game</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');

const SPEED = 120;
const BOOST_SPEED = 200;
const TURN_SPEED = 3.5;
const SEGMENT_DIST = 6;
const SNAKE_RADIUS = 8;
const FOOD_RADIUS = 8;
const GROW_AMOUNT = 8;
const INITIAL_LENGTH = 15;
const SELF_COLLISION_SKIP = 80;

let segments, dirAngle, food, score, highScore, running, animId, lastTime;
let turnDir, boosting;

highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
highScoreEl.textContent = highScore;

function init() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  dirAngle = 0;
  turnDir = 0;
  boosting = false;
  segments = [];
  for (let i = 0; i < INITIAL_LENGTH; i++) {
    segments.push({ x: cx - i * SEGMENT_DIST, y: cy });
  }
  score = 0;
  scoreEl.textContent = 0;
  placeFood();
}

function placeFood() {
  const margin = FOOD_RADIUS + 4;
  let attempts = 0;
  do {
    food = {
      x: margin + Math.random() * (canvas.width - margin * 2),
      y: margin + Math.random() * (canvas.height - margin * 2)
    };
    attempts++;
  } while (attempts < 50 && segments.some(s => {
    const dx = s.x - food.x;
    const dy = s.y - food.y;
    return dx * dx + dy * dy < (SNAKE_RADIUS + FOOD_RADIUS) * (SNAKE_RADIUS + FOOD_RADIUS);
  }));
}

function update(dt) {
  dirAngle += turnDir * TURN_SPEED * dt;

  const speed = boosting ? BOOST_SPEED : SPEED;
  const head = segments[0];
  head.x += Math.cos(dirAngle) * speed * dt;
  head.y += Math.sin(dirAngle) * speed * dt;

  if (head.x < SNAKE_RADIUS || head.x > canvas.width - SNAKE_RADIUS ||
      head.y < SNAKE_RADIUS || head.y > canvas.height - SNAKE_RADIUS) {
    gameOver();
    return;
  }

  for (let i = 1; i < segments.length; i++) {
    const prev = segments[i - 1];
    const curr = segments[i];
    const dx = prev.x - curr.x;
    const dy = prev.y - curr.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > SEGMENT_DIST) {
      curr.x = prev.x - (dx / dist) * SEGMENT_DIST;
      curr.y = prev.y - (dy / dist) * SEGMENT_DIST;
    }
  }

  let skipDist = 0;
  for (let i = 1; i < segments.length - 1; i++) {
    skipDist += SEGMENT_DIST;
    if (skipDist < SELF_COLLISION_SKIP) continue;
    const dx = head.x - segments[i].x;
    const dy = head.y - segments[i].y;
    if (dx * dx + dy * dy < (SNAKE_RADIUS * 1.4) * (SNAKE_RADIUS * 1.4)) {
      gameOver();
      return;
    }
  }

  const fdx = head.x - food.x;
  const fdy = head.y - food.y;
  if (fdx * fdx + fdy * fdy < (SNAKE_RADIUS + FOOD_RADIUS) * (SNAKE_RADIUS + FOOD_RADIUS)) {
    score++;
    scoreEl.textContent = score;
    const tail = segments[segments.length - 1];
    for (let i = 0; i < GROW_AMOUNT; i++) {
      segments.push({ x: tail.x, y: tail.y });
    }
    placeFood();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = segments.length - 1; i >= 0; i--) {
    const ratio = 1 - i / segments.length * 0.5;
    const r = i === 0 ? SNAKE_RADIUS + 2 : SNAKE_RADIUS * (0.6 + 0.4 * ratio);
    ctx.fillStyle = `rgb(${Math.round(0 * ratio)}, ${Math.round(230 * ratio)}, ${Math.round(118 * ratio)})`;
    ctx.beginPath();
    ctx.arc(segments[i].x, segments[i].y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  const head = segments[0];
  const perpAngle = dirAngle + Math.PI / 2;
  const eyeForward = SNAKE_RADIUS * 0.35;
  const eyeSide = SNAKE_RADIUS * 0.4;
  const eyeR = 3;

  ctx.fillStyle = '#fff';
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.arc(
      head.x + Math.cos(dirAngle) * eyeForward + Math.cos(perpAngle) * eyeSide * side,
      head.y + Math.sin(dirAngle) * eyeForward + Math.sin(perpAngle) * eyeSide * side,
      eyeR, 0, Math.PI * 2
    );
    ctx.fill();
  }

  ctx.fillStyle = '#000';
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.arc(
      head.x + Math.cos(dirAngle) * (eyeForward + 1.5) + Math.cos(perpAngle) * eyeSide * side,
      head.y + Math.sin(dirAngle) * (eyeForward + 1.5) + Math.sin(perpAngle) * eyeSide * side,
      1.5, 0, Math.PI * 2
    );
    ctx.fill();
  }

  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x, food.y, FOOD_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function gameOver() {
  running = false;
  if (score > highScore) {
    highScore = score;
    highScoreEl.textContent = highScore;
    localStorage.setItem('snakeHigh', highScore);
  }
  overlay.querySelector('h1').textContent = 'Game Over';
  overlay.querySelector('p').textContent = `Score: ${score}`;
  startBtn.textContent = 'Play Again';
  overlay.style.display = 'flex';
}

function gameLoop(time) {
  if (!running) return;
  if (!lastTime) lastTime = time;
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  update(dt);
  if (running) {
    draw();
    animId = requestAnimationFrame(gameLoop);
  }
}

function start() {
  overlay.style.display = 'none';
  init();
  running = true;
  lastTime = null;
  animId = requestAnimationFrame(gameLoop);
}

startBtn.addEventListener('click', start);

document.addEventListener('keydown', e => {
  if (!running) return;
  const key = e.key;
  if (key === 'ArrowLeft' || key === 'a' || key === 'A') turnDir = -1;
  else if (key === 'ArrowRight' || key === 'd' || key === 'D') turnDir = 1;
  else if (key === 'ArrowUp' || key === 'w' || key === 'W') boosting = true;
});

document.addEventListener('keyup', e => {
  const key = e.key;
  if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && turnDir === -1) turnDir = 0;
  else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && turnDir === 1) turnDir = 0;
  else if (key === 'ArrowUp' || key === 'w' || key === 'W') boosting = false;
});

init();
draw();
</script>
</body>
</html>
