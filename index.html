<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #eee;
  flex-direction: column;
  gap: 16px;
}
#info {
  display: flex;
  gap: 32px;
  font-size: 20px;
}
#info span { font-weight: bold; color: #e94560; }
canvas {
  border: 2px solid #e94560;
  border-radius: 4px;
  background: #16213e;
}
#overlay {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
#overlay h1 { font-size: 48px; color: #e94560; }
#overlay p { font-size: 20px; color: #aaa; }
button {
  padding: 12px 32px;
  font-size: 18px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
button:hover { background: #c73651; }
</style>
</head>
<body>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="highScore">0</span></div>
</div>
<div style="position:relative">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay">
    <h1>Snake</h1>
    <p>Use arrow keys or WASD to move</p>
    <button id="startBtn">Start Game</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;
const TICK = 120;

let snake, dir, nextDir, food, score, highScore, running, interval;

highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
highScoreEl.textContent = highScore;

function init() {
  snake = [{ x: 10, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  scoreEl.textContent = 0;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length * 0.5;
    ctx.fillStyle = `rgb(${Math.round(0 * ratio)}, ${Math.round(230 * ratio)}, ${Math.round(118 * ratio)})`;
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const ex = seg.x * GRID + (dir.x === -1 ? 4 : dir.x === 1 ? 12 : 6);
      const ey = seg.y * GRID + (dir.y === -1 ? 4 : dir.y === 1 ? 12 : 6);
      ctx.fillRect(ex, ey, 4, 4);
    }
  });

  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
}

function gameOver() {
  running = false;
  clearInterval(interval);
  if (score > highScore) {
    highScore = score;
    highScoreEl.textContent = highScore;
    localStorage.setItem('snakeHigh', highScore);
  }
  overlay.querySelector('h1').textContent = 'Game Over';
  overlay.querySelector('p').textContent = `Score: ${score}`;
  startBtn.textContent = 'Play Again';
  overlay.style.display = 'flex';
}

function tick() {
  update();
  draw();
}

function start() {
  overlay.style.display = 'none';
  init();
  running = true;
  interval = setInterval(tick, TICK);
}

startBtn.addEventListener('click', start);

document.addEventListener('keydown', e => {
  if (!running) return;
  const key = e.key;
  if ((key === 'ArrowUp' || key === 'w' || key === 'W') && dir.y === 0) nextDir = { x: 0, y: -1 };
  else if ((key === 'ArrowDown' || key === 's' || key === 'S') && dir.y === 0) nextDir = { x: 0, y: 1 };
  else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && dir.x === 0) nextDir = { x: -1, y: 0 };
  else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && dir.x === 0) nextDir = { x: 1, y: 0 };
});

init();
draw();
</script>
</body>
</html>
